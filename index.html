<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo Task Card</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <main class="page">
    <article class="todo-card" data-testid="test-todo-card" aria-labelledby="todo-title">
      <div class="todo-header">
        <div class="todo-main">
          <div class="badges">
            <span class="badge priority high" data-testid="test-todo-priority" aria-label="Priority: High">
              High
            </span>

            <span class="badge status" data-testid="test-todo-status" aria-label="Status: In Progress" id="todo-status">
              In Progress
            </span>
          </div>

          <h2 id="todo-title" data-testid="test-todo-title">
            Finalize onboarding dashboard mockups
          </h2>

          <p data-testid="test-todo-description">
            Review layout spacing, polish the card interactions, and prepare the
            handoff-ready design notes for the product team before the stakeholder
            check-in.
          </p>
        </div>

        <div class="todo-toggle-wrap">
          <label class="checkbox-label" for="todo-complete-toggle">
            <input type="checkbox" id="todo-complete-toggle" data-testid="test-todo-complete-toggle"
              aria-label="Mark task as complete" />
            <span>Complete</span>
          </label>
        </div>
      </div>

      <div class="todo-meta">
        <div class="meta-block">
          <span class="meta-label">Deadline</span>
          <time id="todo-due-date" data-testid="test-todo-due-date" datetime="2026-04-14T18:00:00Z">
            Due Apr 14, 2026
          </time>
        </div>

        <div class="meta-block">
          <span class="meta-label">Time remaining</span>
          <time id="todo-time-remaining" data-testid="test-todo-time-remaining" datetime="2026-04-14T18:00:00Z"
            aria-live="polite">
            Due in 3 days
          </time>
        </div>
      </div>

      <div class="tags-section">
        <span class="meta-label">Tags</span>
        <ul class="tags" role="list" data-testid="test-todo-tags">
          <li>
            <span class="tag" data-testid="test-todo-tag-work">work</span>
          </li>
          <li>
            <span class="tag" data-testid="test-todo-tag-urgent">urgent</span>
          </li>
          <li>
            <span class="tag">design</span>
          </li>
        </ul>
      </div>
      <div class="edit-form" data-testid="test-todo-edit-form" hidden>
        <div class="edit-field">
          <label for="edit-title">Title</label>
          <input type="text" id="edit-title" data-testid="test-todo-edit-title-input" />

        </div>

        <div class="edit-field">
          <label for="edit-description">Description</label>
          <textarea id="edit-description" data-testid="test-todo-edit-description-input" rows="4">

          </textarea>

        </div>
        <div class ="edit-field">
          <label for="edit-priority">Priority</label>
          <select id="edit-priority" data-testid="test-todo-edit-priority-select">
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
        <div class="edit-field">
          <label for="edit-due-date">Due Date</label>
          <input type="datetime-local" 
          id="edit-due-date" data-testid="test-todo-edit-due-date-input" />
        </div>
        <div class="edit-actions">
          <button type="button" data-testid="test-todo-save-button" id="save-btn">Save</button>
          <button type="button" data-testid="test-todo-cancel-button" id="cancel-btn">Cancel</button>
        </div>
      </div>


        <div class="actions">
          <button type="button" data-testid="test-todo-edit-button" aria-label="Edit task" id="edit-btn">
            Edit
          </button>

          <button type="button" data-testid="test-todo-delete-button" aria-label="Delete task" id="delete-btn">
            Delete
          </button>
        </div>
    </article>
  </main>

  <script src="script.js"></script>
</body>

</html>
